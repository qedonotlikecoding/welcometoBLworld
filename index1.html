<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BL 세계에 떨어진 당신 : 공수 유형 테스트</title>
    <style>
        :root {
            --bl-purple: #4b0082;
            --bl-gold: #ffd700;
            --bl-dark: #121212;
            --bl-red: #8b0000;
            --text-main: #e0e0e0;
        }

        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background: var(--bl-dark);
            background-image: radial-gradient(circle at center, #1a1a2e 0%, #0c0c0c 100%);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            background: rgba(20, 20, 20, 0.9);
            width: 90%;
            max-width: 500px;
            padding: 35px;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .hidden { display: none; }

        h1 { font-size: 1.6rem; color: var(--bl-gold); cursor: pointer; user-select: none; letter-spacing: 1px; margin-bottom: 10px; }
        .sub-title { font-size: 0.9rem; color: #888; margin-bottom: 30px; }
        
        h2 { font-size: 1.1rem; line-height: 1.6; margin-bottom: 20px; word-break: keep-all; min-height: 4.5em; display: flex; align-items: center; justify-content: center; color: #fff; }

        .btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            border: 1px solid #444;
            border-radius: 12px;
            background: #1e1e1e;
            color: #ccc;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            font-size: 0.95rem;
            text-align: left;
            word-break: keep-all;
        }
        .btn:hover { 
            background: var(--bl-purple); 
            color: white; 
            border-color: var(--bl-gold);
            transform: scale(1.02);
        }

        .mode-btn { 
            background: var(--bl-red); 
            color: white; 
            text-align: center; 
            font-weight: bold; 
            border: none;
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.3);
        }

        #progress-bar { width: 100%; height: 4px; background: #333; margin-bottom: 25px; border-radius: 2px; }
        #progress-inner { height: 100%; width: 0%; background: linear-gradient(to right, var(--bl-purple), var(--bl-gold)); transition: width 0.4s; }

        #result-title { font-size: 1.9rem; color: var(--bl-gold); margin: 25px 0; font-weight: 800; text-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
        #result-desc { line-height: 1.8; text-align: left; background: #161616; padding: 22px; border-radius: 12px; font-size: 0.98rem; border-left: 5px solid var(--bl-gold); }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-page">
        <h1 id="main-title" onclick="triggerEgg()">DEBUT OR DIE</h1>
        <div class="sub-title">BL 세계에 떨어진 당신, 당신의 유형은?</div>
        <button class="btn mode-btn" onclick="initTest('gong')">내가 공이라면</button>
        <button class="btn mode-btn" style="background: var(--bl-purple); box-shadow: 0 4px 15px rgba(75, 0, 130, 0.3);" onclick="initTest('su')">내가 수라면</button>
    </div>

    <div id="quiz-page" class="hidden">
        <div id="progress-bar"><div id="progress-inner"></div></div>
        <div id="question-text"></div>
        <div id="options-container"></div>
    </div>

<div id="result-page" class="hidden">
    <div style="font-size: 0.9rem; color: #888;">당신의 운명적인 키워드는</div>
    <div id="result-title"></div>
    <div id="result-quote" style="font-style: italic; color: var(--bl-gold); margin-bottom: 20px; font-size: 1.1rem; font-family: 'Gungsuh', serif;"></div>
    <div id="result-desc"></div>
    <button class="btn" style="text-align: center; margin-top: 30px; background: transparent;" onclick="location.reload()">다시 시작하기</button>
</div>

<script>

            { q: "그가 떨리는 목소리로 '더 이상은 무리'라며 선을 긋습니다.", options: [{text: "담담하게 그의 의사를 수용하고 미련 없이 돌아선다.", type: "d"}, {text: "그 선이 무의미해질 때까지 더 깊숙이 그의 삶을 헤집는다.", type: "a"}, {text: "결심이 얼마나 단단한지 확인하고 싶어 더 자극적인 말을 던진다.", type: "b"}, {text: "그가 편해질 수 있다면, 잠시 거리를 두는 아픔을 감수한다.", type: "c"}] },
            { q: "그가 타인에게 해맑은 미소를 흘리고 있는 모습을 보았습니다.", options: [{text: "멀리서 그 미소를 바라보며 가슴 한구석이 서늘해짐을 느낀다.", type: "c"}, {text: "자연스럽게 끼어들어 분위기를 내 방식대로 주도한다.", type: "b"}, {text: "강하게 그를 감싸 쥐며 소유권을 각인시킨다.", type: "a"}, {text: "흔한 풍경을 본 것처럼 아무 감정 없이 고개를 돌린다.", type: "d"}] },

            { q: "떠나려는 당신의 옷자락을 잡고 그가 처음으로 '가지 마'라며 매달립니다.", options: [{text: "떨리는 그의 손을 마주 잡으며 자리에 다시 주저앉는다.", type: "c"}, {text: "이미 늦었다며 차갑게 뿌리치고 문을 나선다.", type: "d"}, {text: "왜? 내가 없으면 죽을 것 같아? 질문하며 즐긴다.", type: "b"}, {text: "안 가. 아니, 못 가. 내가 널 두고 어디 가겠어.", type: "a"}] },

    let currentIdx = 0;
    let scores = { a:0, b:0, c:0, d:0 };
    let currentMode = '';
    let currentQuestions = [];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initTest(mode) {
        currentMode = mode;
        currentQuestions = db[mode];
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('quiz-page').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        const qData = currentQuestions[currentIdx];
        document.getElementById('question-text').innerHTML = `<h2>${qData.q}</h2>`;
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        const shuffledOptions = shuffle([...qData.options]);
        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = opt.text;
            btn.onclick = () => nextQuestion(opt.type);
            container.appendChild(btn);
        });

        document.getElementById('progress-inner').style.width = `${(currentIdx / currentQuestions.length) * 100}%`;
    }

    function nextQuestion(type) {
        scores[type]++;
        currentIdx++;
        if (currentIdx < currentQuestions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('result-page').classList.remove('hidden');

        const maxScore = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        const resultData = results[currentMode][maxScore];

        const titleEl = document.getElementById('result-title');
        const quoteEl = document.getElementById('result-quote');
        const descEl = document.getElementById('result-desc');

        // 기본 결과 출력
        titleEl.innerText = resultData.title;
        quoteEl.innerText = resultData.quote;

        descEl.innerHTML = `
            <div id="egg-trigger" style="color: #bbb; font-size: 0.9rem; margin-bottom: 10px; cursor: pointer; text-decoration: underline;">
                ${resultData.example}
            </div>
            <div id="egg-scene" style="color: var(--bl-gold); font-weight: bold; margin-bottom: 15px; border-left: 2px solid var(--bl-gold); padding-left: 10px;">
                ${resultData.scene}
            </div>
            <div id="egg-desc" style="line-height: 1.6;">
                ${resultData.desc}
            </div>
        `;

        // 🐶 [이스터 에그] 대형견 다정공(Gong-C)일 때만 작동
        if (currentMode === 'gong' && maxScore === 'c') {
            const trigger = document.getElementById('egg-trigger');
            
            trigger.onclick = function() {
                // 상현이 정보로 데이터 교체
                titleEl.innerText = resultData.eggTitle;
                titleEl.style.color = "#ff69b4"; // 상현이만의 핑크색 포인트
                titleEl.style.textShadow = "0 0 15px rgba(255, 105, 180, 0.5)";
                
                quoteEl.innerText = resultData.eggQuote;
                quoteEl.style.fontFamily = "'Nanum Pen Script', cursive"; // 좀 더 귀여운 폰트 느낌 (설정 시)
                
                trigger.innerText = resultData.eggExample;
                trigger.style.textDecoration = "none";
                trigger.style.color = "#ff69b4";
                
                document.getElementById('egg-scene').innerText = resultData.eggScene;
                document.getElementById('egg-desc').innerText = "🐶🤍🐰";
                
                // 중복 클릭 방지 및 효과
                trigger.onclick = null; 
                console.log("Easter Egg Activated: Sang-hyeon Mode");
            };
        }
    }
